---
layout: default
title: Send Broadcast
---

<div style="max-width: 650px; margin: 0 auto;">
    <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Community Broadcast</h1>
    <p style="color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem;">Submit an announcement. Once approved by an admin, it will appear on the community page.</p>

    <form id="broadcastForm" style="display: flex; flex-direction: column; gap: 1.75rem;">
        <input type="hidden" name="type" value="broadcast">
        
        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Target Community</label>
            <input type="text" id="condo" name="condo" readonly 
                   style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; background: #f8fafc;">
        </div>

        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Alert Subject</label>
            <input type="text" id="title" name="title" placeholder="e.g. Elevator Maintenance" required 
                   style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem;">
        </div>

        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Message Details</label>
            <textarea id="content" name="content" rows="8" placeholder="Type the alert details..." required 
                      style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; font-family: inherit;"></textarea>
        </div>

        <button type="submit" class="btn" style="padding: 1.1rem; font-size: 1.1rem; background: #ef4444; border: none;">
            <i class="fa-solid fa-bullhorn"></i> Submit Broadcast for Review
        </button>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('condo')) {
        document.getElementById('condo').value = urlParams.get('condo');
    }

    document.getElementById('broadcastForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        // Use your existing worker
        const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            alert("Success! Your broadcast request is now a Pull Request on GitHub.");
            window.location.href = "{{ site.baseurl }}/";
        } else {
            alert("Failed to submit. Check worker configuration.");
        }
    };
</script>
