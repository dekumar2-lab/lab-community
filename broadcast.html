---
layout: default
title: Send Community Broadcast
---

<div style="max-width: 650px; margin: 0 auto;">
    <h1 style="font-size: 1.25rem; margin-bottom: 0.5rem; letter-spacing: -1px;">📢 Send Broadcast</h1>
    <p style="color: #64748b; margin-bottom: 2.5rem; font-size: 1rem;">Submit an announcement for your community.
        Approved messages trigger the notification bell.</p>

    <form id="broadcastForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <input type="hidden" name="type" value="broadcast">

        <div class="form-group">
            <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Target Community</label>
            
            <div id="community-input-wrapper">
                <input type="text" id="condo" name="condo" placeholder="Select a community..." required
                    style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; background: #f8fafc;">
            </div>
        </div>

        <div class="form-group">
            <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Urgency Level</label>
            <select name="alert_type"
                style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; background: white;">
                <option value="low">Low (Information)</option>
                <option value="medium" selected>Medium (Notice)</option>
                <option value="high">High (Urgent)</option>
                <option value="critical">Critical (Emergency)</option>
            </select>
        </div>

        <div class="form-group">
            <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Subject</label>
            <input type="text" name="title" placeholder="e.g., Scheduled Maintenance" required
                style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px;">
        </div>

        <div class="form-group">
            <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Announcement Details</label>
            <textarea name="content" rows="6" placeholder="Provide full details of the broadcast..." required
                style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit;"></textarea>
        </div>

        <div class="form-actions">
            <a href="{{ site.baseurl }}/" class="btn-cancel">Cancel</a>
            <button type="submit" id="submitBtn" class="btn-submit-main">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span id="btnText">Submit for Review</span>
            </button>
        </div>
    </form>
</div>

<script id="community-data" type="application/json">
[
    {% assign condos = site.pages | map: 'condo' | uniq | compact | sort %}
    {% for c in condos %}
    "{{ c }}"{% unless forloop.last %},{% endunless %}
    {% endfor %}
]
</script>

<script>
    // 1. Get data safely from the hidden JSON script tag to avoid IDE linting errors
    const communityDataEl = document.getElementById('community-data');
    const availableCommunities = JSON.parse(communityDataEl.textContent);

    const urlParams = new URLSearchParams(window.location.search);
    const condoParam = urlParams.get('condo');
    const wrapper = document.getElementById('community-input-wrapper');

    if (condoParam) {
        // From specific community: Show read-only
        const cleanName = condoParam.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        wrapper.innerHTML = `
            <input type="text" name="condo" value="${cleanName}" readonly
                style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; background: #f1f5f9; color: #64748b; cursor: not-allowed;">
        `;
    } else {
        // From Global: Show dropdown
        let optionsHtml = '<option value="">-- Choose a Community --</option>';
        availableCommunities.forEach(c => {
            optionsHtml += `<option value="${c}">${c}</option>`;
        });

        wrapper.innerHTML = `
            <select name="condo" required
                style="width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; background: white; cursor: pointer;">
                ${optionsHtml}
            </select>
        `;
    }

    // 2. Form Submission logic (stays the same)
    document.getElementById('broadcastForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const originalContent = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Dispatching...';

        const formData = new FormData(e.target);

        try {
            const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                btn.style.background = "#22c55e";
                btn.style.borderColor = "#22c55e";
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Broadcast Staged!';
                
                setTimeout(() => {
                    window.location.href = "{{ site.baseurl }}/";
                }, 1800);
            } else {
                throw new Error("Submission failed");
            }
        } catch (err) {
            btn.disabled = false;
            btn.style.background = "#ef4444";
            btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Retry Submission';
            setTimeout(() => {
                btn.style.background = "";
                btn.innerHTML = originalContent;
            }, 3000);
        }
    };
</script>
