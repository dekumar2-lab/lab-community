---
layout: default
title: Community Dashboard
---

<section class="dashboard-controls" style="max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem;">
    <div class="stats-bar" style="display: flex; gap: 2rem; font-size: 0.9rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem;">
        {% assign condos = site.pages | map: 'condo' | uniq | compact %}
        <span><strong>{{ condos.size }}</strong> Active Districts</span>
        <span><strong>{{ site.pages.size }}</strong> Knowledge Pages</span>
    </div>
    
    <div class="search-wrapper" style="position: relative; width: 100%; max-width: 600px;">
        <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        <input type="text" id="communitySearch" placeholder="Find a community by name..." onkeyup="filterHubs()" 
               style="width: 100%; padding: 1rem 1rem 1rem 3.5rem; border: 2px solid var(--border); border-radius: 14px; font-size: 1rem; box-shadow: var(--shadow);">
    </div>
</section>

<div class="community-grid" id="hubGrid" style="max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;">
    {% for c in condos %}
    <div class="hub-card" data-name="{{ c | downcase }}">
        <a href="{{ site.baseurl }}/content/{{ c | slugify }}/" style="text-decoration: none; color: inherit;">
            <div class="hub-card-inner">
                <p style="text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; color: var(--primary); margin-bottom: 0.5rem;">District Hub</p>
                <h3 style="margin: 0; font-size: 1.1rem;">{{ c }}</h3>
            </div>
        </a>
    </div>
    {% endfor %}
    
    <div id="noResults" style="display: none; grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted);">
        <i class="fa-solid fa-magnifying-glass-blur" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.2;"></i>
        <p>No districts match your search.</p>
    </div>
</div>

<script>
function filterHubs() {
    const input = document.getElementById('communitySearch').value.toLowerCase();
    const cards = document.getElementsByClassName('hub-card');
    const noResults = document.getElementById('noResults');
    let visibleCount = 0;

    for (let card of cards) {
        const name = card.getAttribute('data-name');
        if (name.includes(input)) {
            card.style.display = "block";
            visibleCount++;
        } else {
            card.style.display = "none";
        }
    }

    noResults.style.display = visibleCount === 0 ? "block" : "none";
}
</script>
