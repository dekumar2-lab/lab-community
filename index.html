<h2>Welcome to the Community Wiki</h2>
<p>Select a guide from the left sidebar or use the button below to contribute.</p>

<div class="broadcast-bar" style="background: #e1f5fe; border-left: 5px solid #03a9f4; padding: 15px; margin: 20px 0;">
    <strong>Latest Update:</strong> Our visitor parking policy has been updated for 2026.
</div>

<a href="{{ site.baseurl }}/submit.html" class="btn" style="background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">+ Create New Page</a>
<div id="submission-section">
  <h2>Add a New Community Guide</h2>
  <form action="https://plain-smoke-2176.dekumar-ca.workers.dev" method="POST">
    <input type="text" name="userName" placeholder="Your Name" required><br>
    <input type="text" name="condo" placeholder="Your Building" required><br>
    <input type="text" name="title" placeholder="Guide Topic" required><br>
    <textarea name="content" placeholder="Write the guide here..." rows="5"></textarea><br>
    <button type="submit">Submit for Review</button>
  </form>
</div>

<script>
  // Simple notification if coming back from a successful submission
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('status') === 'success') {
    alert("Thank you! Your guide has been submitted for admin approval.");
  }
</script>
