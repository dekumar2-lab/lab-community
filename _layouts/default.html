<header class="glass-header">
    <div class="logo">🏙️ CondoWiki</div>
    <nav>
        <select onchange="window.location.href=this.value">
            <option>Switch Community</option>
            {% assign communities = site.pages | map: "condo" | uniq %}
            {% for c in communities %}
                <option value="{{ site.baseurl }}/content/{{ c }}/">{{ c }}</option>
            {% endfor %}
        </select>
    </nav>
</header>

<div class="main-container">
    {% if page.condo %}
    <aside class="sidebar">
        <h3>{{ page.condo }} Menu</h3>
        <ul>
            {% for p in site.pages %}
                {% if p.condo == page.condo %}
                <li><a href="{{ site.baseurl }}{{ p.url }}">{{ p.title }}</a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </aside>
    {% endif %}
    
    <main class="content">
        {{ content }}
    </main>
</div>
