<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | CondoWiki</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --glass: rgba(255, 255, 255, 0.85); --border: rgba(226, 232, 240, 0.8); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f1f5f9; color: #1e293b; }
        
        /* Glassmorphism Header */
        header { 
            backdrop-filter: blur(12px); background: var(--glass); 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: #0f172a; }
        .logo span { color: var(--primary); }

        /* Sidebar & Content Wrapper */
        .wrapper { display: flex; max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
        
        .sidebar {
            width: 260px; background: white; border-radius: 16px; 
            border: 1px solid var(--border); padding: 1.5rem; height: fit-content;
            position: sticky; top: 6rem;
        }
        .sidebar h3 { font-size: 0.8rem; text-transform: uppercase; color: #64748b; margin-bottom: 1rem; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li a {
            display: block; padding: 0.7rem 1rem; text-decoration: none; color: #475569;
            border-radius: 8px; transition: 0.2s; margin-bottom: 0.3rem;
        }
        .sidebar li a:hover { background: #f8fafc; color: var(--primary); }
        .sidebar li a.active { background: var(--primary); color: white; }

        .main-card { flex: 1; background: white; padding: 3rem; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .btn { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <a href="{{ site.baseurl }}/" class="logo">🏙️ Condo<span>Wiki</span></a>
    <div style="display: flex; gap: 1rem;">
        <select onchange="location = this.value;" style="padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border);">
            <option value="" disabled selected>Switch Community</option>
            {% assign condos = site.pages | map: 'condo' | uniq | compact %}
            {% for c in condos %}
                <option value="{{ site.baseurl }}/content/{{ c | slugify }}/">{{ c }}</option>
            {% endfor %}
        </select>
        <a href="{{ site.baseurl }}/submit.html" class="btn">+ New Guide</a>
    </div>
</header>

<div class="wrapper">
    {% if page.condo %}
    <aside class="sidebar">
        <h3>{{ page.condo }} Guides</h3>
        <ul>
            {% for p in site.pages %}
                {% if p.condo == page.condo %}
                <li><a href="{{ site.baseurl }}{{ p.url }}" class="{% if page.url == p.url %}active{% endif %}">{{ p.title }}</a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </aside>
    {% endif %}

    <main class="main-card">
        {{ content }}
    </main>
</div>

</body>
</html>
