<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
</head>
<body>
    {% assign current_condo = page.condo %}
    {% include header.html %}
    
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-shell">
        {% include sidebar.html %}

        <main class="main-content">
            <article class="content-card">
                {% if current_condo and page.url != "/submit.html" %}
                <div class="edit-btn-container">
                    <a href="{{ site.baseurl }}/submit.html?edit=true&condo={{ current_condo | url_encode }}&title={{ page.title | url_encode }}" class="btn-edit-action">
                        <i class="fa-regular fa-pen-to-square"></i> Edit
                    </a>
                </div>
                {% endif %}
                <div class="wiki-render">
                    {{ content }}
                </div>
            </article>
        </main>
    </div>

    {% include footer.html %}

    <script>
        // Toggle Logic for Sidebar and Alerts
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('is-open');
            document.getElementById('sidebarOverlay').classList.toggle('is-active');
        });
    </script>
</body>
</html>
