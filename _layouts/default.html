<!DOCTYPE html>
<html lang="en">
{% include "head.html" %}

<body class="bg-gray-50 font-sans leading-normal tracking-normal">
    <div class="flex flex-col md:flex-row">
        {% include "sidebar.html" %}

        <div class="flex-1 md:ml-64">
            {% include "header.html" %}
            <main class="p-8">
                {{ content }}
            </main>
            {% include "footer.html" %}
        </div>
    </div>

    <div id="editor-panel" class="fixed inset-y-0 right-0 w-full max-w-lg bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-[100] border-l border-gray-200">
        <div class="h-full flex flex-col p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">Contribute to Hub</h2>
                <button onclick="togglePanel()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <form id="contribution-form" class="space-y-4 flex flex-col h-full">
                <div class="bg-purple-50 p-3 rounded-lg flex justify-between items-center border border-purple-100">
                    <span class="text-xs font-semibold text-purple-700 uppercase tracking-wider">Active Community</span>
                    <span class="text-sm font-bold text-purple-900" id="current-condo-display">Detecting...</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Page Title</label>
                        <input type="text" name="title" id="form-title" required placeholder="e.g., Best Local Cafes" 
                               class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Entry Type</label>
                        <select name="type" id="type-select" onchange="updateUrgencyVisibility()" class="w-full border border-gray-300 rounded-md p-2 text-sm bg-white">
                            <option value="wiki">Wiki Page</option>
                            <option value="broadcast">Live Notice</option>
                        </select>
                    </div>
                    <div id="urgency-wrapper" class="hidden text-sm">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Urgency</label>
                        <select name="alert_type" class="w-full border border-gray-300 rounded-md p-2 text-sm bg-white">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>

                <div class="flex-grow flex flex-col">
                    <div class="flex items-center justify-between border-b pb-2 mb-2">
                        <div class="flex space-x-1">
                            <button type="button" onclick="insertFormat('# ', '')" class="p-1.5 hover:bg-gray-100 rounded text-gray-600 font-bold" title="Heading">H</button>
                            <button type="button" onclick="insertFormat('**', '**')" class="p-1.5 hover:bg-gray-100 rounded text-gray-600 font-bold" title="Bold">B</button>
                            <button type="button" onclick="insertFormat('- ', '')" class="p-1.5 hover:bg-gray-100 rounded text-gray-600" title="List">•</button>
                            <button type="button" onclick="insertFormat('[', '](url)')" class="p-1.5 hover:bg-gray-100 rounded text-gray-600" title="Link">🔗</button>
                        </div>
                        <div class="flex bg-gray-100 rounded-md p-1 scale-90">
                            <button type="button" onclick="setMode('write')" id="btn-write" class="px-3 py-1 text-xs font-bold rounded bg-white shadow-sm text-purple-600">Write</button>
                            <button type="button" onclick="setMode('preview')" id="btn-preview" class="px-3 py-1 text-xs font-bold rounded text-gray-500">Preview</button>
                        </div>
                    </div>

                    <div class="relative flex-grow">
                        <textarea name="content" id="form-content" required 
                            class="w-full h-full min-h-[300px] border border-gray-300 rounded-md p-3 text-sm font-mono focus:ring-2 focus:ring-purple-500 outline-none resize-none"
                            placeholder="Type your content here..."></textarea>
                        
                        <div id="form-preview" class="hidden w-full h-full min-h-[300px] border border-gray-100 bg-gray-50 rounded-md p-3 text-sm overflow-y-auto prose prose-purple max-w-none">
                            </div>
                    </div>
                </div>

                <div class="pt-4 border-t flex items-center space-x-3">
                    <button type="button" onclick="togglePanel()" class="flex-1 py-2 text-sm text-gray-500 font-medium hover:text-gray-700">Cancel</button>
                    <button type="submit" id="submit-btn" class="flex-[2] py-2.5 bg-purple-600 text-white rounded-lg text-sm font-bold hover:bg-purple-700 shadow-lg shadow-purple-200 transition-all active:scale-95">
                        Sync to GitHub
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 1. Panel Visibility & Context Detection
        function togglePanel() {
            const panel = document.getElementById('editor-panel');
            panel.classList.toggle('translate-x-full');
            
            // Auto-detect Hub from URL (e.g., /content/elm-drive/ -> elm-drive)
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const hubName = pathParts.length >= 2 ? pathParts[pathParts.length - 2] : "General";
            document.getElementById('current-condo-display').innerText = hubName.replace(/-/g, ' ').toUpperCase();
        }

        // 2. Formatting & Preview Logic
        function insertFormat(prefix, suffix) {
            const el = document.getElementById('form-content');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            el.value = el.value.substring(0, start) + prefix + el.value.substring(start, end) + suffix + el.value.substring(end);
            el.focus();
            el.setSelectionRange(start + prefix.length, end + prefix.length);
        }

        function setMode(mode) {
            const editor = document.getElementById('form-content');
            const preview = document.getElementById('form-preview');
            const isPreview = mode === 'preview';
            
            if(isPreview) preview.innerHTML = marked.parse(editor.value || "_Nothing to preview yet..._");
            
            editor.classList.toggle('hidden', isPreview);
            preview.classList.toggle('hidden', !isPreview);
            document.getElementById('btn-write').className = isPreview ? "px-3 py-1 text-xs font-bold rounded text-gray-500" : "px-3 py-1 text-xs font-bold rounded bg-white shadow-sm text-purple-600";
            document.getElementById('btn-preview').className = !isPreview ? "px-3 py-1 text-xs font-bold rounded text-gray-500" : "px-3 py-1 text-xs font-bold rounded bg-white shadow-sm text-purple-600";
        }

        function updateUrgencyVisibility() {
            const type = document.getElementById('type-select').value;
            document.getElementById('urgency-wrapper').classList.toggle('hidden', type !== 'broadcast');
        }

        // 3. Worker Integration
        document.getElementById('contribution-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = "Connecting to GitHub...";

            const formData = new FormData(e.target);
            formData.append("condo", document.getElementById('current-condo-display').innerText);

            try {
                // Ensure this URL matches your Cloudflare Worker URL
                const response = await fetch('YOUR_WORKER_URL_HERE', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    alert("Success! Your contribution is being processed.");
                    window.location.reload(); // Reload to show potential changes or clear state
                } else {
                    throw new Error(result.error || "Failed to submit.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
