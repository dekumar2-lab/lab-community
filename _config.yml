# Site Settings
title: ResiHub
baseurl: "" # Leave empty if your site is at the root domain
url: "https://lab-community.pages.dev"

# Force Jekyll to recognize the root as the source
source: .
destination: _site
layouts_dir: _layouts
includes_dir: _includes

# Ensure Jekyll processes these specific folders
include:
  - _layouts
  - _includes
  - assets
