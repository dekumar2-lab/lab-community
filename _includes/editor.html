<!-- Editor panel -->
<div id="editor-panel" class="editor-drawer">
    <div class="drawer-inner">
        <div class="drawer-header">
            <h2 style="margin:0; font-size: 1.2rem;">Contribute</h2>
            <button onclick="togglePanel()" class="drawer-close">&times;</button>
        </div>

        <form id="drawer-form">
            <div class="hub-context">
                <!-- <label for="condo">Community / Building Hub</label> -->
                <strong id="target-display">{{ current_condo | default: "General Hub" | upcase }}</strong>
            </div>

            <div class="editor-toolbar" style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                <label for="wiki-image-upload" class="upload-btn" style="cursor: pointer; background: #673ab7; color: white; padding: 5px 15px; border-radius: 4px; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 5px;">
                    <i class="fas fa-image"></i> Add Image
                </label>
                <input type="file" id="wiki-image-upload" accept="image/*" style="display: none;">
                <span id="upload-status" style="font-size: 0.8rem; color: #aaa;"></span>
            </div>

            <div class="field">
                <label for="title">Resource Title</label>
                <input type="text" class="hub-context" id="title" name="title" placeholder="e.g., Waste Management Guide" disabled>
            </div>

            <div class="editor-container-box">
                <label for="content">Documentation Content (Markdown Supported)</label>
                <div class="submit-toolbar">
                    <div class="tools">
                        <button type="button" onclick="addTag('h')">H</button>
                        <button type="button" onclick="addTag('b')">B</button>
                        <button type="button" onclick="addTag('i')">I</button> <button type="button"
                            onclick="addTag('ul')">ul</button> <button type="button"
                            onclick="addTag('ol')">ol</button> <button type="button"
                            onclick="addTag('code')">&lt;/&gt;</button>
                        <div class="mode-switch"></div>
                        <button type="button" onclick="addTag('- ')">•</button>
                    </div>
                    <div class="modes">
                        <button type="button" id="tab-write" class="active" onclick="switchMode('write')">Write</button>
                        <button type="button" id="tab-preview" onclick="switchMode('preview')">Preview</button>
                    </div>
                </div>
                <textarea name="content" id="f-content" required placeholder="Describe the resource..."></textarea>
                <div id="f-preview" style="display: none;" class="markdown-preview"></div>
            </div>

            <div class="drawer-footer">
                <button type="button" onclick="togglePanel()" class="btn-cancel">Cancel</button>
                <button type="submit" id="sync-btn" class="btn-sync">Update</button>
            </div>
        </form>
    </div>
</div>

<script>

    const uploadInput = document.getElementById('wiki-image-upload');
const statusSpan = document.getElementById('upload-status');
const editorTextarea = document.getElementById('f-content');
const WORKER_URL = 'https://resihub-image-uploader.dekumar-ca.workers.dev';

uploadInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // 1. Update UI to "Processing"
    statusSpan.innerText = "Uploading to R2...";
    const placeholder = `\n![Uploading ${file.name}...]()\n`;
    editorTextarea.setRangeText(placeholder);

    const formData = new FormData();
    formData.append('file', file);

    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.url) {
            // 2. Success: Replace placeholder with the permanent R2 link
            const finalMarkdown = `\n![${file.name}](${data.url})\n`;
            editorTextarea.value = editorTextarea.value.replace(placeholder, finalMarkdown);
            statusSpan.innerText = "Upload complete!";
            setTimeout(() => { statusSpan.innerText = ""; }, 3000);
        }
    } catch (err) {
        console.error("Upload failed:", err);
        statusSpan.innerText = "Upload failed!";
        editorTextarea.value = editorTextarea.value.replace(placeholder, "");
    }
});
</script>
