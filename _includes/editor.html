<!-- Editor panel -->
<div id="editor-panel" class="editor-drawer">
    <div class="drawer-inner">
        <div class="drawer-header">
            <h2 style="margin:0; font-size: 1.2rem;">Contribute</h2>
            <button onclick="togglePanel()" class="drawer-close">&times;</button>
        </div>

        <form id="drawer-form">
            <div class="hub-context">
                <!-- <label for="condo">Community / Building Hub</label> -->
                <strong id="target-display">{{ current_condo | default: "General Hub" | upcase }}</strong>
            </div>

            <div class="field">
                <label for="title">Resource Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Waste Management Guide" required>
            </div>

            <div class="editor-container-box">
                <label for="content">Documentation Content (Markdown Supported)</label>
                <div class="toolbar">
                    <div class="tools">
                        <button type="button" onclick="addTag('# ')">H</button>
                        <button type="button" onclick="addTag('*', '*')">B</button>
                        <button type="button" onclick="addTag('- ')">•</button>
                    </div>
                    <div class="modes">
                        <button type="button" id="tab-write" class="active" onclick="switchMode('write')">Write</button>
                        <button type="button" id="tab-preview" onclick="switchMode('preview')">Preview</button>
                    </div>
                </div>
                <textarea name="content" id="f-content" required placeholder="Describe the resource..."></textarea>
                <div id="f-preview" style="display: none;" class="markdown-preview"></div>
            </div>

            <div class="drawer-footer">
                <button type="button" onclick="togglePanel()" class="btn-cancel">Cancel</button>
                <button type="submit" id="sync-btn" class="btn-sync">Sync to GitHub</button>
            </div>
        </form>
    </div>
</div>
