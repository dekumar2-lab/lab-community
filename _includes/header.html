<header class="site-header">
    <div class="header-container">
        <button class="mobile-menu-toggle" id="navToggle" aria-label="Toggle Navigation">
            <i class="fa-solid fa-bars"></i>
        </button>

        {% comment %} Use relative_url to ensure the link works from any sub-directory {% endcomment %}
        <a href="{{ '/' | relative_url }}" class="logo">
            <i class="fa-solid fa-city"></i> Resi<span>Hub</span>
        </a>

        <div class="header-actions">
            <select id="themeToggle" class="community-switcher" aria-label="Switch Theme">
                <option value="purple">Deep Purple</option>
                <option value="blue">Blue</option>
            </select>

            {% if current_condo %}
            <select class="community-switcher" onchange="location = this.value;">
                <option value="#">Switch Community...</option>
                {% assign condos = site.pages | map: 'condo' | uniq | compact %}
                {% for c in condos %}
                    {% comment %} 1. Create the slug first to avoid parentheses errors {% endcomment %}
                    {% assign c_slug = c | slugify %}
                    
                    {% comment %} 2. Build the full path string {% endcomment %}
                    {% capture condo_url %}/content/{{ c_slug }}/{% endcapture %}
                    
                    <option value="{{ condo_url | relative_url }}" 
                        {% if c == current_condo %}selected{% endif %}>
                        {{ c }}
                    </option>
                {% endfor %}
            </select>
            {% endif %}

            <a href="{{ '/submit.html' | relative_url }}" class="btn-primary-header">
                <i class="fa-solid fa-plus"></i> <span>Contribute</span>
            </a>
        </div>
    </div>
</header>
