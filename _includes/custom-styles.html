<style>
    :root {
        --primary: #2563eb;
        --glass: rgba(255, 255, 255, 0.85);
        --border: rgba(226, 232, 240, 0.8);
        --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        background: radial-gradient(at top right, #f8fafc, #e2e8f0);
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* --- Global Header --- */
    .site-header {
        backdrop-filter: blur(12px);
        background: var(--glass);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-weight: 800;
        font-size: 1.4rem;
        text-decoration: none;
        color: #0f172a;
    }

    .logo span {
        color: var(--primary);
    }

    /* --- Sidebar & Main Layout --- */
    .app-shell {
        display: flex;
        max-width: 1400px;
        margin: 2.5rem auto;
        padding: 0 2rem;
        gap: 2.5rem;
        flex: 1;
        width: 100%;
        box-sizing: border-box;
    }

    .sidebar {
        width: 280px;
        background: var(--glass);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        height: fit-content;
        position: sticky;
        top: 6rem;
        box-shadow: var(--shadow);
    }

    .sidebar h3 {
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #64748b;
        letter-spacing: 1px;
        margin-bottom: 1.25rem;
    }

    .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar li a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0.85rem 1.25rem;
        text-decoration: none;
        color: #475569;
        border-radius: 12px;
        transition: all 0.3s ease;
        margin-bottom: 6px;
        font-weight: 500;
    }

    .sidebar li a:hover {
        background: #f1f5f9;
        color: var(--primary);
        transform: translateX(5px);
    }

    .sidebar li a.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 8px 15px rgba(37, 99, 235, 0.25);
    }

    /* .content-card { 
            flex: 1; background: white; padding: 3.5rem; border-radius: 28px; 
            border: 1px solid var(--border); box-shadow: var(--shadow); 
        } */

    /* --- Footer --- */
    .site-footer {
        background: white;
        border-top: 1px solid var(--border);
        padding: 2.5rem;
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        margin-top: auto;
    }

    /* --- Buttons & Inputs --- */
    .btn {
        background: var(--primary);
        color: white;
        padding: 0.75rem 1.75rem;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.2);
    }

    :root {
        --primary: #2563eb !important;
        --glass: rgba(255, 255, 255, 0.85) !important;

    }

    .content-card {
        flex: 1 !important;
        background: white !important;
        padding: 3.5rem !important;
        border-radius: 28px !important;
        border: 1px solid var(--border) !important;
        box-shadow: var(--shadow) !important;

    /* Force Form Visibility */
    input[type="text"],
    textarea {

        border-radius: 12px !important;

        display: block;
        margin-bottom: 0.6rem;
    }

    #submitDiv {
        max-width: 650px;
        margin: 0 auto;
    }

    /* Community Dropdown Styling */
    .community-switcher {
        padding: 0.6rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid var(--glass-border);
        background: white;
        font-family: inherit;
        font-size: 0.9rem;
        color: var(--text-main);
        cursor: pointer;
        outline: none;
        transition: 0.3s;
    }

    .community-switcher:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow);
    }

    /* Notification Bell Styling */
    .notification-wrapper {
        position: relative;
        font-size: 1.4rem;
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        align-items: center;
    }

    .notification-wrapper:hover {
        color: var(--primary);
    }


    .notification-badge {
        position: absolute;
        top: 0;
        right: -2px;
        width: 10px;
        height: 10px;
        background: #ef4444;
        /* Bright Red */
        border: 2px solid white;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }

        70% {
            transform: scale(1);
            box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
        }

        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);

        text-decoration: none !important;

        transition: 0.2s;
    }

    .btn-broadcast:hover {
        background: #ef4444;
        color: white;
    }

        background: #fef2f2;
        border: 1px solid #fee2e2;
        color: #991b1b;
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 600;
    }

    /* Sidebar Sections */
    .sidebar-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--text-muted);
        letter-spacing: 1px;
        margin-bottom: 0.75rem;
        font-weight: 700;
    }

    .broadcast-link {
        color: var(--primary) !important;
        background: rgba(37, 99, 235, 0.08) !important;
        font-weight: 600;
    }

    .broadcast-link:hover {
        background: var(--primary) !important;
        color: white !important;
    }

    .collapsible-alert {
        background: #fff5f5;
        border: 1px solid #fee2e2;
        border-radius: 10px;
        margin-bottom: 0.75rem;
        overflow: hidden;
    }

    .alert-header {
        padding: 0.75rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-size: 0.9rem;
        color: #991b1b;
    }

    .alert-body {
        display: block;
        /* Shown by default, can be toggled */
        font-size: 0.9rem;
        color: #4b5563;
    }

    .close-alert {
        background: none;
        border: none;
        font-size: 1.2rem;
        color: #ef4444;
        cursor: pointer;
        padding: 0 5px;
    }

    .close-alert:hover {
        color: #b91c1c;
    }

    /* --- Separate Broadcast Content Box --- */
    .broadcast-wrapper {
        background: #fffcfc;
        border: 1px solid #fee2e2;
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 2.5rem;
        box-shadow: 0 4px 20px rgba(239, 68, 68, 0.05);
    }

    .alert-inner-text {
