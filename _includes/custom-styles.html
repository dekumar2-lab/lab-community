<style>
    :root {
        --primary: #2563eb;
        --primary-light: #eff6ff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --white: #ffffff;
        --shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.05);
    }

    body {
        font-family: 'Inter', sans-serif;
        background: #f8fafc;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    h1,
    h2,
    h3,
    .logo {
        font-family: 'Plus Jakarta Sans', sans-serif;
        letter-spacing: -0.02em;
    }

    /* Header Styling */
    .site-header {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem 2rem;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .header-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 1.5rem;
        font-weight: 800;
        text-decoration: none;
        color: var(--text-main);
    }

    .logo span {
        color: var(--primary);
    }

    .btn-primary-header {
        background: var(--primary);
        color: white;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.85rem;
    }

    /* Sidebar Navigation */
    .app-shell {
        display: flex;
        flex: 1;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
    }

    .sidebar {
        width: 260px;
        padding: 2rem 1.5rem;
        border-right: 1px solid var(--border);
        background: #ffffff;
    }

    .nav-section {
        margin-bottom: 2rem;
    }

    .nav-section small {
        color: var(--text-muted);
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 0.8rem;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0.75rem 1rem;
        color: var(--text-muted);
        text-decoration: none;
        border-radius: 10px;
        font-weight: 500;
        font-size: 0.9rem;
        transition: 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
        background: var(--primary-light);
        color: var(--primary);
    }

    .btn-broadcast-sidebar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0.75rem;
        margin-top: 1rem;
        background: #fff1f2;
        color: #ef4444 !important;
        border-radius: 10px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid #fecaca;
        font-size: 0.85rem;
    }

    /* Main Content Card & Watermark */
    .main-content {
        flex: 1;
        padding: 2.5rem;
        max-width: 1000px;
    }

    .content-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3rem;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
    }

    /* Subtle Architectural Watermark */
    .content-card::after,
    .hub-card::after {
        content: "\f1ad";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        bottom: -20px;
        right: -10px;
        font-size: 6rem;
        color: var(--primary);
        opacity: 0.025;
        transform: rotate(-10deg);
        pointer-events: none;
    }

    /* Forms (Submit/Broadcast) Fix */
    #submissionForm,
    #broadcastForm {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
    }

    input,
    textarea,
    select {
        width: 100%;
        padding: 0.8rem;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.95rem;
        box-sizing: border-box;
    }

    input:focus,
    textarea:focus {
        border-color: var(--primary);
        outline: none;
    }

    /* Home Page Grid & Reduced Card Sizes */
    .community-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 1.25rem;
        margin-top: 3rem;
    }

    .hub-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        text-align: center;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
    }

    .hub-card:hover {
        transform: translateY(-3px);
        border-color: var(--primary);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
    }

    .hub-card h3 {
        margin: 0.5rem 0 0.2rem 0;
        font-size: 1rem;
        color: var(--text-main);
    }

    .hub-card p {
        font-size: 0.75rem;
        color: var(--primary);
        font-weight: 700;
    }

    /* Alert Drawer Styles */
    .alert-collapsible-wrapper {
        margin-bottom: 2rem;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    .alert-strip-header {
        background: var(--text-main);
        color: white;
        padding: 0.8rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }

    .live-indicator {
        width: 8px;
        height: 8px;
        background: #22c55e;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        animation: pulse 2s infinite;
    }

    .alert-drawer-body {
        display: none;
        background: white;
        max-height: 350px;
        overflow-y: auto;
    }

    .alert-drawer-body.is-open {
        display: block;
    }

    .drawer-item {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
    }

    .urgency-high {
        border-left: 4px solid #ef4444;
        background: #fff1f2;
    }

    @keyframes pulse {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }

        100% {
            opacity: 1;
        }
    }

    /* Footer */
    .site-footer {
        background: #f1f5f9;
        padding: 3rem;
        text-align: center;
        border-top: 1px solid var(--border);
        margin-top: auto;
    }

    .footer-logo {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
    }

    .footer-logo span {
        color: var(--primary);

        .wiki-content-render {
            color: var(--text-main);
            line-height: 1.6;
        }

        .wiki-content-render h1,
        .wiki-content-render h2 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .wiki-content-render p {
            margin-bottom: 1rem;
        }

        .wiki-content-render ul,
        .wiki-content-render ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }
    }

    .community-switcher {
        max-width: 180px;
        padding: 0.5rem;
        font-size: 0.85rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        background: #fdfdfd;
    }

    /* Fixes alignment of the "Create Hub" button text */
    .btn-primary-header {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: nowrap;
        line-height: 1;
    }

    /* Fixes alignment of the "Dispatch Alert" button in sidebar */
    .btn-broadcast-sidebar {
        display: flex !important;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
        /* Crucial for width: 100% */
    }

    /* Ensure icons have consistent spacing */
    .btn-primary-header i,
    .btn-broadcast-sidebar i {
        margin-right: 8px;
    }

    /* --- Main Form Submission Button --- */
    .btn-submit-main {
        background: var(--primary);
        color: white;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        border: none;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        /* Full width for mobile-friendly forms */
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .btn-submit-main:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
    }

    .btn-submit-main:disabled {
        background: #94a3b8;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    /* Spinner for Loading State */
    .fa-spin {
        animation: fa-spin 1s infinite linear;
    }

    @keyframes fa-spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>
