<style>
    :root {
        --primary: #2563eb;
        --primary-light: #eff6ff;
        --accent: #ff4757;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --glass: rgba(255, 255, 255, 0.85);
        --border: rgba(226, 232, 240, 0.8);
        --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
    }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        background: radial-gradient(at top right, #f8fafc, #e2e8f0);
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    h1, h2, h3, .logo { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }

    /* Header & Logo */
    .site-header {
        background: var(--glass);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--text-main); }
    .logo span { color: var(--primary); }

    /* Sidebar / Left Menu */
    .app-shell { display: flex; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }
    .sidebar { width: 280px; padding: 2rem; border-right: 1px solid var(--border); }
    .nav-section { margin-bottom: 2.5rem; }
    .nav-section small { display: block; font-weight: 800; color: var(--text-muted); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 1rem; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 12px; font-weight: 500; transition: 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--primary-light); color: var(--primary); }
    .btn-broadcast { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box; padding: 0.8rem; margin-top: 1rem; background: #fff1f2; color: var(--accent) !important; border-radius: 12px; font-weight: 700; text-decoration: none; border: 1px solid #fecaca; }

    /* Content Card & Watermark */
    .main-content { flex: 1; padding: 2rem; }
    .content-card { 
        background: white; border-radius: 24px; padding: 3rem; box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .content-card::after {
        content: ""; position: absolute; bottom: -30px; right: -30px; width: 300px; height: 300px;
        background-image: url('https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/building-2.svg');
        background-repeat: no-repeat; background-size: contain; opacity: 0.02; filter: grayscale(100%); pointer-events: none; transform: rotate(-15deg);
    }

    /* Footer */
    .site-footer { background: var(--text-main); color: white; padding: 4rem 2rem; margin-top: auto; }
    .footer-content { max-width: 1200px; margin: 0 auto; text-align: center; }
    .footer-brand { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 1rem; }
    .footer-brand span { color: var(--primary); }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
    .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
</style>
