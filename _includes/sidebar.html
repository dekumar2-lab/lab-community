<aside class="sidebar">
    <nav class="sidebar-nav">
        <div class="nav-section">
            <small>DASHBOARD</small>
            <a href="{{ site.baseurl }}/" class="nav-item {% if page.url == '/' %}active{% endif %}">
                <i class="fa-solid fa-grip"></i> Overview
            </a>
            <a href="{{ site.baseurl }}/submit.html?mode=new" class="nav-item">
                <i class="fa-solid fa-plus"></i> New District
            </a>
        </div>

        {% if current_condo and current_condo != "General" and page.url != "/" %}
        <div class="nav-section">
            <small>{{ current_condo | upcase }}</small>
            {% assign condo_pages = site.pages | where: "condo", current_condo %}
            {% for p in condo_pages %}
                <a href="{{ site.baseurl }}{{ p.url }}" class="nav-item {% if page.url == p.url %}active{% endif %}">
                    <i class="fa-solid fa-file-lines"></i> {{ p.title }}
                </a>
            {% endfor %}
            
            <div class="sidebar-footer-action">
                <a href="{{ site.baseurl }}/submit.html?condo={{ current_condo | slugify }}" class="btn-create-wiki">
                    <i class="fa-solid fa-plus-circle"></i> Create Wiki
                </a>
            </div>
        </div>
        {% endif %}
    </nav>
</aside>
