---
layout: default
title: Contribute to ResiHub
---

<div class="submission-container">
    <div class="form-header">
        <h1>Contribute Content</h1>
        <p>Your submission will create a secure Pull Request on GitHub. Approved content becomes live for the community.</p>
    </div>

    <form id="submissionForm">
        <input type="hidden" name="type" value="wiki">

        <div class="form-group">
            <label for="condo">Community / Building Hub</label>
            <input type="text" id="condo" name="condo" placeholder="e.g., North York District" required>
            <small class="input-hint">Ensure this matches the existing district name if contributing to a specific wiki.</small>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 12px; background: var(--primary-light); padding: 1.25rem; border-radius: 12px; margin: 2rem 0; border: 1px solid #dbeafe;">
            <input type="checkbox" id="setupDefaults" name="setupDefaults" style="width: 20px; height: 20px; cursor: pointer;">
            <label for="setupDefaults" style="margin: 0; cursor: pointer; font-size: 0.95rem;">
                <strong>Initialize Community Hub</strong> 
                <br><span style="font-weight: 400; color: var(--text-muted);">Automatically create Overview, Intelligence, Movie, and Restaurant pages.</span>
            </label>
        </div>

        <div class="form-group">
            <label for="title">Resource Title</label>
            <input type="text" id="title" name="title" placeholder="e.g., Waste Management Guide" required>
        </div>

        <div class="form-group">
            <label for="content">Documentation Content (Markdown)</label>
            <textarea id="content" name="content" rows="12" placeholder="Write your content here..." required></textarea>
        </div>

        <div class="form-actions">
            <a href="{{ site.baseurl }}/" class="btn-cancel">Cancel</a>
            <button type="submit" id="submitBtn" class="btn-submit-main">
                <i class="fa-solid fa-cloud-arrow-up"></i> Submit to Review
            </button>
        </div>
    </form>
</div>

<script>
    document.getElementById('submissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const originalContent = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Synchronizing...';

        const formData = new FormData(e.target);

        try {
            const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                btn.style.background = "#22c55e";
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Contribution Sent!';
                setTimeout(() => {
                    alert("Success! The community and default pages have been staged for review.");
                    window.location.href = "{{ site.baseurl }}/";
                }, 800);
            } else {
                throw new Error("Network synchronization failed");
            }
        } catch (err) {
            btn.disabled = false;
            btn.innerHTML = originalContent;
            alert("Error: " + err.message);
        }
    };
</script>
