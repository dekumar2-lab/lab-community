---
layout: default
title: Submit Guide
---

<div style="max-width: 650px; margin: 0 auto;">
    <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Contribute Content</h1>
    <p style="color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem;">Your submission will create a Pull Request on GitHub for admin review.</p>

    <form id="submissionForm" style="display: flex; flex-direction: column; gap: 1.75rem;">
        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Community / Building</label>
            <input type="text" id="condo" name="condo" placeholder="e.g. 3504" required 
                   style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem;">
        </div>

        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Guide Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. Visitor Parking Rules" required 
                   style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem;">
        </div>

        <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.6rem;">Content (Markdown Support)</label>
            <textarea id="content" name="content" rows="12" placeholder="Write your guide content here..." required 
                      style="width: 100%; padding: 1rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; font-family: inherit; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn" style="padding: 1.1rem; font-size: 1.1rem;">Submit for Review</button>
    </form>
</div>

<script>
    // Pre-fill building if coming from a specific wiki
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('condo')) {
        document.getElementById('condo').value = urlParams.get('condo');
    }

    document.getElementById('submissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            alert("Success! Your contribution has been sent for review.");
            window.location.href = "{{ site.baseurl }}/";
        } else {
            alert("Submission failed. Please check your GitHub Token permissions in the Worker.");
        }
    };
</script>
