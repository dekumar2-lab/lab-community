---
layout: default
title: Submit a New Guide
---

<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Contribute Knowledge</h2>
    <p style="color: #64748b; margin-bottom: 2.5rem;">Fill in the details below. Your submission will create a Pull Request for review.</p>

    <form id="submissionForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div>
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Community / Building Name</label>
            <input type="text" id="condo" name="condo" placeholder="e.g. 3504" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box;">
        </div>

        <div>
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Guide Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. Visitor Parking Rules" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box;">
        </div>

        <div>
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Content (Markdown)</label>
            <textarea id="content" name="content" rows="10" placeholder="Describe the guide content here..." required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-family: inherit;"></textarea>
        </div>

        <button type="submit" class="btn" style="padding: 1rem;">Submit for Admin Review</button>
    </form>
</div>

<script>
    // If user arrived from a building page, auto-fill the building name
    const params = new URLSearchParams(window.location.search);
    if (params.has('condo')) {
        document.getElementById('condo').value = params.get('condo');
    }

    document.getElementById('submissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            alert("Success! A Pull Request has been opened on GitHub.");
            window.location.href = "{{ site.baseurl }}/";
        } else {
            alert("Error: Check Cloudflare logs for Token issues.");
        }
    };
</script>
