---
layout: default
title: Contribute to ResiHub
---

<div class="submission-container">
    <div class="form-header">
        <h1 id="formTitle">Contribute Content</h1>
        <p>Your submission will create a secure Pull Request on GitHub for administrator review.</p>
    </div>

    <form id="submissionForm" class="professional-form">
        <input type="hidden" name="type" value="wiki">

        <div class="form-group">
            <label for="condo">Community / Building Hub</label>
            <input type="text" id="condo" name="condo" placeholder="e.g., North York District" required>
        </div>

        <div class="form-group">
            <label for="title">Resource Title</label>
            <input type="text" id="title" name="title" placeholder="e.g., Waste Management Guide" required>
        </div>

        <div class="form-group">
            <label for="content">Documentation Content (Markdown Supported)</label>
            <textarea id="content" name="content" rows="12" required></textarea>
        </div>

        <div class="form-actions">
            <a href="{{ site.baseurl }}/" class="btn-cancel">Cancel</a>
            <button type="submit" id="submitBtn" class="btn-submit-main">
                <i class="fa-solid fa-cloud-arrow-up"></i> Submit Changes
            </button>
        </div>
    </form>
</div>

<script>
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Handle normal creation mode
        if (urlParams.has('condo') && !urlParams.has('edit')) {
            const condoName = urlParams.get('condo').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            document.getElementById('condo').value = condoName;
        }

        // Handle Edit Mode
        if (urlParams.get('edit') === 'true') {
            const condo = urlParams.get('condo');
            const title = urlParams.get('title');
            
            document.getElementById('formTitle').innerText = "Edit Page";
            document.getElementById('condo').value = condo;
            document.getElementById('title').value = title;
            
            // UI locks for consistent file paths
            document.getElementById('condo').readOnly = true;
            document.getElementById('title').readOnly = true;
            document.getElementById('condo').style.background = "#f1f5f9";
            document.getElementById('title').style.background = "#f1f5f9";

            const folder = condo.toLowerCase().replace(/\s+/g, '-');
            const slug = title.toLowerCase().replace(/\s+/g, '-');
            const fileName = (slug === 'district-overview' || title === 'District Overview') ? 'index' : slug;
            
            try {
                const response = await fetch(`https://raw.githubusercontent.com/dekumar2-lab/lab-community/master/content/${folder}/${fileName}.md`);
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('content').value = text.replace(/^---[\s\S]*?---\s*/, "").trim();
                }
            } catch (err) { console.error("Edit fetch failed", err); }
        }
    };

    document.getElementById('submissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Synchronizing ...';

        try {
            const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
                method: 'POST',
                body: new FormData(e.target)
            });

            if (response.ok) {
                alert("Success! Changes staged for review.");
                window.location.href = "{{ site.baseurl }}/";
            }
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Retry Submission";
            alert("Error: " + err.message);
        }
    };
</script>
