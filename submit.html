---
layout: default
title: Submit a Guide
---

<div style="max-width: 600px;">
    <h2>Community Contribution</h2>
    <p>Your proposal will be sent to the admin for review.</p>
    
    <form action="https://plain-smoke-2176.dekumar-ca.workers.dev" method="POST">
        <input type="text" name="userName" placeholder="Your Name" required style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ddd;">
        <input type="text" name="condo" placeholder="Building Name" required style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ddd;">
        <input type="text" name="title" id="t" placeholder="Guide Title" required style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ddd;">
        <textarea name="content" id="c" rows="10" placeholder="Content (Markdown)" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;"></textarea>
        <button type="submit" class="btn-primary" style="width:100%; border:none; cursor:pointer; padding:15px;">Send Proposal</button>
    </form>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    if(p.get('edit')){
        document.getElementById('t').value = p.get('title');
        document.getElementById('t').readOnly = true;
        document.getElementById('c').value = p.get('content');
    }
</script>
