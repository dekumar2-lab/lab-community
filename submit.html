---
layout: default
title: Contribute to ResiHub
---

<div class="submission-container">
    <div class="form-header">
        <h1 id="formTitle">Contribute Content</h1>
        <p>Changes will be staged as a Pull Request for administrator review.</p>
    </div>

    <form id="submissionForm">
        <div class="form-group">
            <label>Community / Building Hub</label>
            <input type="text" id="condo" name="condo" required>
        </div>

        <div class="form-group">
            <label>Resource Title</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label>Documentation (Markdown)</label>
            <textarea id="content" name="content" rows="12" required></textarea>
        </div>

        <div class="form-actions">
            <a href="{{ site.baseurl }}/" class="btn-cancel">Cancel</a>
            <button type="submit" id="submitBtn" class="btn-submit-main">Submit Content</button>
        </div>
    </form>
</div>

<script>
    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('edit') === 'true') {
            const condo = params.get('condo');
            const title = params.get('title');

            document.getElementById('formTitle').innerText = "Edit Page";
            document.getElementById('condo').value = condo;
            document.getElementById('title').value = title;
            
            // Lock fields for editing
            document.getElementById('condo').readOnly = true;
            document.getElementById('title').readOnly = true;
            document.getElementById('condo').style.background = "#f1f5f9";
            document.getElementById('title').style.background = "#f1f5f9";

            const folder = condo.toLowerCase().replace(/\s+/g, '-');
            const file = title.toLowerCase().replace(/\s+/g, '-');
            const fileName = (file === 'district-overview' || title === 'District Overview') ? 'index' : file;

            try {
                const response = await fetch(`https://raw.githubusercontent.com/dekumar2-lab/lab-community/master/content/${folder}/${fileName}.md`);
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('content').value = text.replace(/^---[\s\S]*?---\s*/, "").trim();
                }
            } catch (e) { console.error("Edit fetch failed", e); }
        }
    };

    document.getElementById('submissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Synchronizing...";

        try {
            const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
                method: 'POST',
                body: new FormData(e.target)
            });
            if (response.ok) {
                alert("Success! Changes staged for review.");
                window.location.href = "{{ site.baseurl }}/";
            }
        } catch (err) { alert("Error: " + err.message); btn.disabled = false; }
    };
</script>
