---
layout: default
title: Submit Guide
---

<div class="form-container">
    <form action="https://plain-smoke-2176.dekumar-ca.workers.dev" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="userName" placeholder="e.g. John Doe" required>
        </div>
        <div class="form-group">
            <label>Condo/Building Name</label>
            <input type="text" name="condo" placeholder="e.g. SkyTower Phase 1" required>
        </div>
        <div class="form-group">
            <label>Guide Topic</label>
            <input type="text" name="title" id="form-title" placeholder="e.g. Visitor Parking" required>
        </div>
        <div class="form-group">
            <label>Description & Steps</label>
            <textarea name="content" id="form-content" rows="12" placeholder="Write your guide using Markdown..."></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem; border: none; cursor: pointer;">
            🚀 Submit to Community
        </button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('edit')) {
        document.querySelector('h1').innerText = "Edit Guide";
        document.getElementById('form-title').value = params.get('title');
        document.getElementById('form-title').readOnly = true;
        document.getElementById('form-content').value = params.get('content');
    }
</script>
