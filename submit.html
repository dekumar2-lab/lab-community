<form id="submissionForm">
  <label for="userName">Your Name</label>
  <input type="text" id="userName" name="userName" required>

  <label for="condo">Community / Building</label>
  <select id="condoSelect" onchange="toggleNewCommunity(this.value)">
    <option value="SkyTower">SkyTower</option>
    <option value="GrandPlaza">GrandPlaza</option>
    <option value="OTHER">-- Add New Community --</option>
  </select>
  
  <input type="text" id="newCondo" name="newCondo" placeholder="Enter building name" style="display:none; margin-top:10px;">
  
  <input type="hidden" id="condo" name="condo">

  <label for="title">Guide Title</label>
  <input type="text" id="title" name="title" placeholder="e.g. Visitor Parking" required>

  <label for="content">Content (Markdown)</label>
  <textarea id="content" name="content" rows="10" required></textarea>

  <button type="submit">Submit for Review</button>
</form>

<script>
function toggleNewCommunity(val) {
    const newCityInput = document.getElementById('newCondo');
    newCityInput.style.display = (val === 'OTHER') ? 'block' : 'none';
}

document.getElementById('submissionForm').onsubmit = async (e) => {
    e.preventDefault();
    const selectVal = document.getElementById('condoSelect').value;
    // Set the hidden condo field based on selection
    document.getElementById('condo').value = (selectVal === 'OTHER') ? document.getElementById('newCondo').value : selectVal;

    const formData = new FormData(e.target);
    const response = await fetch('https://plain-smoke-2176.dekumar-ca.workers.dev/', {
        method: 'POST',
        body: formData
    });
    
    if (response.ok) {
        alert("Success! A Pull Request has been opened for admin review.");
    } else {
        alert("Submission failed. Check Cloudflare logs.");
    }
};
</script>
